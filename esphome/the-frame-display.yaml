substitutions:
  device_name: the-frame-display
  frame_url: "http://192.168.0.4:7375"  # LAN host:port — update before flash
  deep_sleep_minutes: "60"
  default_w: "800"
  default_h: "480"
  events_days: "7"        # days ahead to fetch from /api/device/events
  events_chance: "30"     # 0–100: % chance of showing events screen
  key1_gpio: "2"          # D1 — refresh (current orientation)
  key2_gpio: "3"          # D2 — toggle orientation H↔V, then refresh
  key3_gpio: "5"          # D4 — status screen (SSID, signal, battery, time, address)
  resume_hour: "7"        # first redraw hour after the overnight gap; auto wakes for hours < this are pushed here
  quiet_timezone: "Europe/Warsaw"

esphome:
  name: ${device_name}
  friendly_name: The Frame Display
  on_boot:
    priority: -10
    then:
      - lambda: |-
          auto cause = esp_sleep_get_wakeup_cause();
          id(action_mode) = 0;
          id(auto_wake) = (cause != ESP_SLEEP_WAKEUP_EXT1);  // timer/cold = automatic; EXT1 = button

          if (cause == ESP_SLEEP_WAKEUP_EXT1) {
            uint64_t mask = esp_sleep_get_ext1_wakeup_status();
            if (mask & (1ULL << ${key2_gpio})) {
              id(frame_orientation) = !id(frame_orientation);
              ESP_LOGI("boot", "KEY2: toggled orientation to %s",
                id(frame_orientation) ? "vertical" : "horizontal");
            } else if (mask & (1ULL << ${key3_gpio})) {
              id(action_mode) = 1;
              ESP_LOGI("boot", "KEY3: status screen");
            } else {
              ESP_LOGI("boot", "KEY1 or timer wakeup: refresh");
            }
          } else {
            ESP_LOGI("boot", "cold boot");
          }

          // Register EXT1 button wakeup. deep_sleep component handles timer wakeup via sleep_duration.
          uint64_t btn_mask = (1ULL << ${key1_gpio}) | (1ULL << ${key2_gpio}) | (1ULL << ${key3_gpio});
          esp_sleep_enable_ext1_wakeup(btn_mask, ESP_EXT1_WAKEUP_ANY_LOW);
      - safe_mode.mark_successful
      # Pre-WiFi quiet-gap guard: if an automatic wake lands before resume_hour (e.g. RTC drift
      # made the overnight sleep wake at 06:50), go straight back to sleep until resume_hour
      # without spending WiFi/fetch/redraw. Buttons (auto_wake=false) and an unsynced clock skip this.
      - if:
          condition:
            lambda: |-
              if (!id(auto_wake)) return false;
              auto now = id(sntp_time).now();
              return now.is_valid() && now.hour < ${resume_hour};
          then:
            - logger.log: "quiet gap: woke before resume_hour — sleeping until resume"
            - script.execute: enter_sleep
      - logger.log: "boot: waiting for WiFi..."
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - output.turn_on: adc_en
      - delay: 10ms
      - component.update: battery_voltage
      - component.update: battery_pct
      - output.turn_off: adc_en
      - if:
          condition:
            lambda: "return id(action_mode) == 1;"
          then:
            - script.execute: show_wifi_info
          else:
            - script.execute: refresh

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

deep_sleep:
  id: the_frame_sleep
  sleep_duration: ${deep_sleep_minutes}min   # fallback only; enter_sleep overrides per-sleep

time:
  - platform: sntp
    id: sntp_time
    timezone: ${quiet_timezone}
    servers:
      - pool.ntp.org
      - time.google.com

psram:
  mode: octal
  speed: 80MHz

logger:

ota:
  - platform: esphome
    password: "a3f8c21d9e4b7056f1a2d3e8c9b4f705"
    on_begin:
      then:
        - deep_sleep.prevent: the_frame_sleep

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "The Frame Fallback"

captive_portal:

http_request:
  verify_ssl: false
  timeout: 10s
  watchdog_timeout: 15s

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

font:
  # ── Event screen ──────────────────────────────────────────────────────────
  - file: "gfonts://Fraunces"
    id: font_event_title
    size: 96
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 ,.?!'\"()-_:/#%ĄĆĘŁŃÓŚŹŻąćęłńóśźż"
  - file: "gfonts://Nunito"
    id: font_event_date
    size: 44
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 ,.?!'\"()-_:/#%ĄĆĘŁŃÓŚŹŻąćęłńóśźż"
  - file: "gfonts://Nunito"
    id: font_event_desc
    size: 32
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 ,.?!'\"()-_:/#%ĄĆĘŁŃÓŚŹŻąćęłńóśźż"
  # ── Status screen ─────────────────────────────────────────────────────────
  - file: "gfonts://Nunito"
    id: font_status_small
    size: 24
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 ,.?!'\"()-_:/#%ĄĆĘŁŃÓŚŹŻąćęłńóśźż"

display:
  - platform: waveshare_epaper
    id: the_frame_display
    model: 7.50inv2
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin:
      number: GPIO4
      inverted: true
    update_interval: never
    lambda: |-
      // Word-wraps text inside a box (x, y, w, h).
      // align_bottom=false: anchors to top — first line at y, returns bottom of last line.
      // align_bottom=true:  anchors to bottom — last line at y+h, returns top of first line.
      // Lines outside the box are clipped. Draws outline when debug_mode is on.
      auto text_box = [&](int x, int y, int w, int h,
                          esphome::display::BaseFont *font,
                          const std::string &text,
                          bool align_bottom) -> int {
        int x1, y1, tw, th;
        it.get_text_bounds(0, 0, "Ag", font, display::TextAlign::TOP_LEFT, &x1, &y1, &tw, &th);
        int line_h = th + 4;

        std::vector<std::string> lines;
        std::string current;
        size_t pos = 0;
        while (pos <= text.size()) {
          size_t sp = text.find(' ', pos);
          if (sp == std::string::npos) sp = text.size();
          std::string word = text.substr(pos, sp - pos);
          std::string candidate = current.empty() ? word : current + " " + word;
          int cx, cy, cw, ch;
          it.get_text_bounds(x, y, candidate.c_str(), font,
                             display::TextAlign::TOP_LEFT, &cx, &cy, &cw, &ch);
          if (cw > w && !current.empty()) {
            lines.push_back(current);
            current = word;
          } else {
            current = candidate;
          }
          pos = sp + 1;
        }
        if (!current.empty()) lines.push_back(current);

        int total_h = (int)lines.size() * line_h - 4;
        int start_y = align_bottom ? (y + h - total_h) : y;
        int cur_y = start_y;
        for (const auto &line : lines) {
          if (cur_y >= y && cur_y + th <= y + h)
            it.print(x, cur_y, font, line.c_str());
          cur_y += line_h;
        }

        if (id(debug_mode)) it.rectangle(x, y, w, h);
        return align_bottom ? start_y : (start_y + total_h);
      };

      // Panel is mounted inverted; horizontal=180°, vertical=270°.
      // The status screen always stays in landscape regardless of frame_orientation.
      bool portrait = id(frame_orientation) && id(action_mode) != 1;
      it.set_rotation(portrait
        ? display::DISPLAY_ROTATION_270_DEGREES
        : display::DISPLAY_ROTATION_180_DEGREES);

      if (id(action_mode) == 1) {
        // ── Status screen — landscape 800×480 ────────────────────────────────
        // Left: system info (incl. current NTP time). Right: last-5 refresh
        // times. Footer: FW version + build datetime. No QR, no signal bars.
        it.print(40, 18, id(font_event_date), "The Frame");
        it.line(40, 78, 760, 78);

        const int lx = 40;    // label column
        const int vx = 210;   // value column
        const int row = 52;
        int y = 96;

        it.print(lx, y, id(font_event_desc), "Sieć");
        it.print(vx, y, id(font_event_desc), id(wifi_ssid).state.c_str());
        y += row;

        int rssi = (int)id(wifi_rssi).state;
        int bars = rssi >= -50 ? 5 : rssi >= -60 ? 4 : rssi >= -70 ? 3 : rssi >= -80 ? 2 : 1;
        it.print(lx, y, id(font_event_desc), "Sygnał");
        it.printf(vx, y, id(font_event_desc), "%d/5 (%d dBm)", bars, rssi);
        y += row;

        it.print(lx, y, id(font_event_desc), "Bateria");
        it.printf(vx, y, id(font_event_desc), "%d%%", (int)id(battery_pct).state);
        y += row;

        // Current NTP time — confirms SNTP sync is working.
        it.print(lx, y, id(font_event_desc), "Czas");
        auto now = id(sntp_time).now();
        if (now.is_valid())
          it.strftime(vx, y, id(font_event_desc), "%H:%M:%S", now);
        else
          it.print(vx, y, id(font_event_desc), "brak sync.");
        y += row;

        // Address (full width, small font).
        it.print(lx, y, id(font_status_small), "Adres:");
        it.print(vx, y + 4, id(font_status_small), "${frame_url}");

        // Right column: last 5 refresh times (most recent first).
        it.line(480, 88, 480, 300);
        it.print(500, 96, id(font_status_small), "Odświeżenia:");
        for (int i = 0; i < 5; i++) {
          int ry = 134 + i * 34;
          it.printf(500, ry, id(font_status_small), "%d.", i + 1);
          uint32_t ts = id(refresh_log)[i];
          if (ts == 0) {
            it.print(540, ry, id(font_status_small), "-");
          } else {
            auto rt = esphome::ESPTime::from_epoch_local((time_t) ts);
            it.strftime(540, ry, id(font_status_small), "%m-%d %H:%M:%S", rt);
          }
        }

        // Footer: firmware build datetime. App.get_compilation_time() is UTC and
        // ends with a " +0000" offset whose '+' isn't in the font (renders as a
        // tofu box) — strip it and label UTC ourselves. Uniquely IDs each compile.
        std::string build_time = App.get_compilation_time();
        size_t tz = build_time.find('+');
        if (tz != std::string::npos) {
          build_time.erase(tz);
          while (!build_time.empty() && build_time.back() == ' ') build_time.pop_back();
        }
        it.printf(40, 448, id(font_status_small), "Build: %s UTC", build_time.c_str());

      } else if (id(show_events) && !id(event_title).empty()) {
        // Build date line: "Niedziela" or "Niedziela, 14:00"
        std::string date_line = id(event_date);
        if (!id(event_time).empty()) date_line += ", " + id(event_time);

        bool has_desc = !id(event_description).empty();

        if (portrait) {
          // Portrait 480×800, 10px margins: break at 460 with desc, 458 (last line centered) without
          int mid = has_desc ? 460 : 458;
          text_box(10, 5, 460, mid - 5, id(font_event_title), id(event_title), true);
          text_box(10, mid + 20, 460, 80, id(font_event_date), date_line, false);
          if (has_desc)
            text_box(10, mid + 104, 460, 790 - mid - 104, id(font_event_desc), id(event_description), false);
          else if (!id(event_long_date).empty())
            text_box(10, mid + 104, 460, 790 - mid - 104, id(font_event_desc), id(event_long_date), false);
        } else {
          // Landscape 800×480, 10px margins: break at 295 with desc, 297 (last line centered) without
          int mid = has_desc ? 295 : 297;
          text_box(10, 5, 780, mid - 5, id(font_event_title), id(event_title), true);
          text_box(10, mid + 20, 780, 80, id(font_event_date), date_line, false);
          if (has_desc)
            text_box(10, mid + 104, 780, 52, id(font_event_desc), id(event_description), false);
          else if (!id(event_long_date).empty())
            text_box(10, mid + 104, 780, 52, id(font_event_desc), id(event_long_date), false);
        }

      } else {
        // ── Photo screen ──────────────────────────────────────────────────────
        it.image(0, 0, id(frame_dl));
      }

online_image:
  - id: frame_dl
    format: PNG
    type: BINARY
    buffer_size: 65536
    url: "${frame_url}/api/device/photo"
    update_interval: never
    on_download_finished:
      - logger.log: "online_image: download finished, updating display"
      - component.update: the_frame_display
      - if:
          condition:
            lambda: "return id(action_mode) == 0;"
          then:
            - script.execute: enter_sleep

globals:
  - id: frame_orientation
    type: bool
    restore_value: true
    initial_value: 'false'   # false = horizontal, true = vertical

  - id: action_mode
    type: int
    restore_value: false
    initial_value: '0'       # 0 = refresh, 1 = status screen

  - id: auto_wake
    type: bool
    restore_value: false
    initial_value: 'true'    # true = timer/cold-boot wake; false = EXT1 button wake

  - id: show_events
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: event_title
    type: std::string
    restore_value: false
    initial_value: '""'

  - id: event_date
    type: std::string
    restore_value: false
    initial_value: '""'

  - id: event_time
    type: std::string
    restore_value: false
    initial_value: '""'

  - id: event_description
    type: std::string
    restore_value: false
    initial_value: '""'

  - id: event_long_date
    type: std::string
    restore_value: false
    initial_value: '""'

  - id: debug_mode
    type: bool
    restore_value: false
    initial_value: 'false'

  # Last 5 content-refresh times as epoch seconds, most-recent-first (0 = empty).
  # restore_value so the history survives deep sleep; shown on the status screen.
  - id: refresh_log
    type: uint32_t[5]
    restore_value: true
    initial_value: '{0, 0, 0, 0, 0}'

output:
  - platform: gpio
    pin: GPIO6
    id: adc_en

text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid
      internal: true

sensor:
  - platform: wifi_signal
    id: wifi_rssi
    internal: true
    update_interval: 10s
  - platform: adc
    pin: GPIO1
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 11db
    filters:
      - multiply: 1.936  # 2.0 (voltage divider) * 0.968 (calibration factor)
  - platform: template
    id: battery_pct
    internal: true
    update_interval: never
    lambda: |-
      float v = id(battery_voltage).state;
      float pct = (v - 3.0f) / (4.2f - 3.0f) * 100.0f;
      return std::max(0.0f, std::min(100.0f, pct));

binary_sensor:
  - platform: gpio
    pin: { number: GPIO2, mode: INPUT_PULLUP, inverted: true }
    id: btn_key1
    on_press:
      - logger.log: "KEY1: refresh"
      - lambda: "id(action_mode) = 0;"
      - script.execute: refresh

  - platform: gpio
    pin: { number: GPIO3, mode: INPUT_PULLUP, inverted: true }
    id: btn_key2
    on_press:
      - logger.log: "KEY2: toggle orientation"
      - lambda: |-
          id(action_mode) = 0;
          id(frame_orientation) = !id(frame_orientation);
      - script.execute: refresh

  - platform: gpio
    pin: { number: GPIO5, mode: INPUT_PULLUP, inverted: true }
    id: btn_key3
    on_press:
      - logger.log: "KEY3: status screen"
      - script.execute: show_wifi_info

script:
  # ── enter_sleep ───────────────────────────────────────────────────────────────
  # Deep-sleeps until the next top-of-hour (NTP-aligned), so wakes land on :00.
  # If that next hour falls inside the overnight gap (00:00–06:00, i.e. < resume_hour),
  # it targets resume_hour (07:00) instead — so 23:00 is the last redraw and the device
  # does one long sleep straight to 07:00. Falls back to a plain 60 min if the clock
  # isn't synced yet (first boot before SNTP). deep_sleep.enter respects deep_sleep.prevent.
  - id: enter_sleep
    then:
      - deep_sleep.enter:
          id: the_frame_sleep
          sleep_duration: !lambda |-
            auto now = id(sntp_time).now();
            if (!now.is_valid()) return (uint32_t) 3600000;  // 60 min fallback
            int now_total = now.hour * 3600 + now.minute * 60 + now.second;
            int wake_hour = (now.hour + 1) % 24;             // candidate: next top-of-hour
            uint32_t secs;
            if (wake_hour < ${resume_hour}) {                // 00:00–06:00 → skip the gap
              int target = ${resume_hour} * 3600;            // 07:00
              secs = (now_total >= target) ? (86400 - now_total + target)
                                           : (target - now_total);
            } else {
              secs = 3600 - (now.minute * 60 + now.second);  // to next :00
            }
            return secs * 1000UL;

  # ── show_wifi_info ────────────────────────────────────────────────────────────
  # Renders the status screen (SSID, signal, battery, current NTP time, LAN address).
  # Stays awake (action_mode stays 1, so nothing calls enter_sleep) — OTA available.
  # Any button press → its own handler resets action_mode=0 and refreshes content.
  - id: show_wifi_info
    then:
      - lambda: "id(action_mode) = 1;"
      - component.update: the_frame_display

  # ── refresh ───────────────────────────────────────────────────────────────────
  # Fetches upcoming events. On a dice roll win, shows the event poster.
  # Otherwise fetches a photo. Both paths end with a display update.
  - id: refresh
    then:
      # Record this refresh time (epoch, most-recent-first) for the status screen.
      - lambda: |-
          auto now = id(sntp_time).now();
          if (now.is_valid()) {
            for (int i = 4; i > 0; i--) id(refresh_log)[i] = id(refresh_log)[i - 1];
            id(refresh_log)[0] = (uint32_t) now.timestamp;
          }
      - logger.log:
          format: "battery: voltage=%.2fV pct=%.0f%%"
          args: ["id(battery_voltage).state", "id(battery_pct).state"]
      - logger.log: "refresh: fetching events"
      - http_request.get:
          # ts = device epoch (0 if clock unsynced) so the server access log can
          # compare the device clock against server time.
          url: !lambda |-
            auto now = id(sntp_time).now();
            uint32_t ts = now.is_valid() ? (uint32_t) now.timestamp : 0;
            return std::string("${frame_url}/api/device/events?days=${events_days}&ts=") +
                   std::to_string(ts);
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  id(show_events) = false;
                  id(event_title) = "";
                  id(event_date) = "";
                  id(event_time) = "";
                  id(event_description) = "";
                  id(event_long_date) = "";

                  ESP_LOGI("refresh", "events status: %d", response->status_code);
                  if (response->status_code != 200) return;

                  uint8_t roll = esp_random() % 100;
                  ESP_LOGI("refresh", "dice roll: %d (threshold: ${events_chance})", roll);
                  if (roll >= ${events_chance}) return;

                  JsonDocument doc;
                  if (deserializeJson(doc, body) != DeserializationError::Ok) {
                    ESP_LOGW("refresh", "JSON parse failed");
                    return;
                  }
                  if (!doc.is<JsonArray>() || doc.as<JsonArray>().size() == 0) {
                    ESP_LOGI("refresh", "no events");
                    return;
                  }

                  // Weighted random pick: closest event has highest weight.
                  // N events → weights N, N-1, …, 1; total = N*(N+1)/2.
                  JsonArray arr = doc.as<JsonArray>();
                  int n = (int)arr.size();
                  int total = n * (n + 1) / 2;
                  int pick = (int)(esp_random() % (uint32_t)total);
                  int chosen = 0, cumulative = 0;
                  for (int i = 0; i < n; i++) {
                    cumulative += (n - i);
                    if (pick < cumulative) { chosen = i; break; }
                  }
                  JsonObject ev = arr[chosen];
                  id(event_title) = ev["title"].as<std::string>();
                  id(event_date)  = ev["label"].as<std::string>();
                  auto t = ev["time"];
                  id(event_time) = (t.isNull() || !t.is<const char*>()) ? "" : t.as<std::string>();
                  auto d = ev["description"];
                  id(event_description) = (d.isNull() || !d.is<const char*>()) ? "" : d.as<std::string>();
                  auto ld = ev["longDate"];
                  id(event_long_date) = (ld.isNull() || !ld.is<const char*>()) ? "" : ld.as<std::string>();
                  id(show_events) = true;
                  ESP_LOGI("refresh", "picked event %d/%d: %s / %s %s",
                    chosen + 1, n, id(event_title).c_str(), id(event_date).c_str(),
                    id(event_time).c_str());

      - if:
          condition:
            lambda: "return id(show_events);"
          then:
            - script.execute: render_events
      - if:
          condition:
            lambda: "return !id(show_events);"
          then:
            - script.execute: fetch_photo

  # ── render_events ─────────────────────────────────────────────────────────────
  # Activates the event poster and redraws the display.
  # Requires event_title and event_date globals to be populated first.
  - id: render_events
    then:
      - lambda: "id(show_events) = true;"
      - logger.log:
          format: "render_events: %s / %s"
          args: ["id(event_title).c_str()", "id(event_date).c_str()"]
      - component.update: the_frame_display
      - if:
          condition:
            lambda: "return id(action_mode) == 0;"
          then:
            - script.execute: enter_sleep

  # ── fetch_photo ───────────────────────────────────────────────────────────────
  # Builds the photo URL for the current orientation and triggers download.
  # on_download_finished handles component.update.
  - id: fetch_photo
    then:
      - logger.log:
          format: "fetch_photo: orientation=%s"
          args: ["id(frame_orientation) ? \"vertical\" : \"horizontal\""]
      - online_image.set_url:
          id: frame_dl
          url: !lambda |-
            auto now = id(sntp_time).now();
            uint32_t ts = now.is_valid() ? (uint32_t) now.timestamp : 0;
            return std::string("${frame_url}/api/device/photo?orientation=") +
                   (id(frame_orientation) ? "vertical" : "horizontal") +
                   "&w=${default_w}&h=${default_h}&invert=1&ts=" + std::to_string(ts);
