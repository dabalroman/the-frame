substitutions:
  device_name: the-frame-display
  frame_url: "http://192.168.0.4:7375"  # LAN host:port — update before flash
  deep_sleep_minutes: "60"
  default_w: "800"
  default_h: "480"
  events_days: "3"        # days ahead to fetch events (/api/device/events?days=)
  events_chance: "30"     # 0–100: % chance of showing events when events exist
  key1_gpio: "2"          # D1 — refresh (current orientation)
  key2_gpio: "3"          # D2 — toggle orientation H↔V, then refresh
  key3_gpio: "5"          # D4 — WiFi info + QR code screen

esphome:
  name: ${device_name}
  friendly_name: The Frame Display
  on_boot:
    priority: 800
    then:
      - lambda: |-
          auto cause = esp_sleep_get_wakeup_cause();
          id(action_mode) = 0;

          if (cause == ESP_SLEEP_WAKEUP_EXT1) {
            uint64_t mask = esp_sleep_get_ext1_wakeup_status();
            if (mask & (1ULL << ${key2_gpio})) {
              id(frame_orientation) = !id(frame_orientation);
            } else if (mask & (1ULL << ${key3_gpio})) {
              id(action_mode) = 1;
            }
          }

          uint64_t btn_mask = (1ULL << ${key1_gpio}) | (1ULL << ${key2_gpio}) |
                              (1ULL << ${key3_gpio});
          esp_sleep_enable_ext1_wakeup(btn_mask, ESP_EXT1_WAKEUP_ANY_LOW);
          esp_sleep_enable_timer_wakeup(
            (uint64_t)${deep_sleep_minutes} * 60ULL * 1000000ULL);
      - script.execute: run_action

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:

ota:
  - platform: esphome
    password: !secret the_frame_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "The Frame Fallback"

captive_portal:

http_request:
  verify_ssl: false
  timeout: 10s
  watchdog_timeout: 15s

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

font:
  - file: "gfonts://Fraunces"
    id: font_event_title
    size: 72
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 -_:.ĄĆĘŁŃÓŚŹŻąćęłńóśźż"
  - file: "gfonts://Nunito"
    id: font_event_date
    size: 44
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 -_:.ĄĆĘŁŃÓŚŹŻąćęłńóśźż"
  - file: "gfonts://Nunito"
    id: font_wifi_label
    size: 24
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 -_:."
  - file: "gfonts://Nunito"
    id: font_wifi_value
    size: 44
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 -_:."
  - file: "gfonts://Nunito"
    id: font_wifi_rssi
    size: 32
    glyphs: "0123456789- dBm"

display:
  - platform: waveshare_epaper
    id: the_frame_display
    model: 7.50inv2
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin:
      number: GPIO4
      inverted: true
    update_interval: never
    lambda: |-
      if (id(action_mode) == 1) {
        // ── WiFi + QR screen ──────────────────────────────────────────────────
        it.print(30, 50,  id(font_wifi_label), "SIEC");
        it.print(30, 85,  id(font_wifi_value), WiFi.SSID().c_str());

        it.print(30, 210, id(font_wifi_label), "SYGNAL");
        int rssi = WiFi.RSSI();
        int bars = rssi >= -50 ? 5 : rssi >= -60 ? 4 : rssi >= -70 ? 3 : rssi >= -80 ? 2 : 1;
        for (int i = 0; i < 5; i++) {
          if (i < bars) it.filled_rectangle(30 + i * 50, 255, 38, 65);
          else          it.rectangle(      30 + i * 50, 255, 38, 65);
        }
        it.printf(300, 270, id(font_wifi_rssi), "%d dBm", rssi);

        it.line(400, 0, 400, 480);

        if (id(frame_dl).has_finished_loading()) {
          it.image(400, 0, id(frame_image));
        }

      } else if (id(show_events)) {
        // ── Event poster — first line from /api/device/events ─────────────────
        it.print(60, 200, id(font_event_title), id(event_line0).c_str());

      } else {
        // ── Photo screen ──────────────────────────────────────────────────────
        it.image(0, 0, id(frame_image));
      }

image:
  - id: frame_image
    file: ""
    type: BINARY

online_image:
  - id: frame_dl
    format: PNG
    type: BINARY
    buffer_size: 65536
    url: ""
    update_interval: never
    on_download_finished:
      - component.update: the_frame_display
      - deep_sleep.enter: the_frame_sleep

deep_sleep:
  id: the_frame_sleep

globals:
  - id: frame_orientation
    type: bool
    restore_value: true
    initial_value: 'false'   # false = horizontal, true = vertical

  - id: action_mode
    type: int
    restore_value: false
    initial_value: '0'       # 0 = refresh, 1 = WiFi+QR

  - id: show_events
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: event_line0
    type: std::string
    restore_value: false

  - id: exit_wifi_qr
    type: bool
    restore_value: false
    initial_value: 'false'

binary_sensor:
  - platform: gpio
    pin: { number: GPIO2, mode: INPUT_PULLUP, inverted: true }
    id: btn_key1
    on_press:
      - lambda: "id(exit_wifi_qr) = true;"

  - platform: gpio
    pin: { number: GPIO3, mode: INPUT_PULLUP, inverted: true }
    id: btn_key2
    on_press:
      - lambda: "id(exit_wifi_qr) = true;"

  - platform: gpio
    pin: { number: GPIO5, mode: INPUT_PULLUP, inverted: true }
    id: btn_key3
    on_press:
      - lambda: "id(exit_wifi_qr) = true;"

script:
  - id: run_action
    then:
      - if:
          condition:
            lambda: "return id(action_mode) == 1;"
          then:
            # ── WiFi + QR mode ────────────────────────────────────────────────
            - lambda: "id(exit_wifi_qr) = false;"
            - component.update: the_frame_display
            - online_image.set_url: "${frame_url}/api/device/qr"
            - online_image.load: frame_dl
            - wait_until:
                condition:
                  lambda: "return id(frame_dl).has_finished_loading() || id(frame_dl).has_failed();"
                timeout: 15s
            - component.update: the_frame_display
            - while:
                condition:
                  lambda: "return !id(exit_wifi_qr);"
                then:
                  - wait_until:
                      condition:
                        lambda: "return id(exit_wifi_qr);"
                      timeout: 10s
                  - if:
                      condition:
                        lambda: "return !id(exit_wifi_qr);"
                      then:
                        - component.update: the_frame_display
            # Button pressed — replace WiFi+QR with normal content before sleeping
            - script.execute: do_refresh

      - if:
          condition:
            lambda: "return id(action_mode) == 0;"
          then:
            - script.execute: do_refresh

  - id: do_refresh
    then:
      - http_request.get:
          url: "${frame_url}/api/device/events?days=${events_days}"
          on_response:
            then:
              - lambda: |-
                  std::string s(response.data.begin(), response.data.end());
                  bool has_events = !s.empty();
                  bool show = has_events &&
                              (esp_random() % 100) < (uint32_t)${events_chance};
                  id(show_events) = show;
                  if (show) {
                    size_t nl = s.find('\n');
                    id(event_line0) = (nl != std::string::npos) ? s.substr(0, nl) : s;
                  }

      - if:
          condition:
            lambda: "return id(show_events);"
          then:
            - component.update: the_frame_display
            - deep_sleep.enter: the_frame_sleep

      - if:
          condition:
            lambda: "return !id(show_events);"
          then:
            - online_image.set_url: !lambda |-
                return std::string("${frame_url}/api/device/photo?orientation=") +
                       (id(frame_orientation) ? "vertical" : "horizontal") +
                       "&w=${default_w}&h=${default_h}";
            - online_image.load: frame_dl
